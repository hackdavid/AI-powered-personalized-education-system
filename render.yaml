# Render service blueprint for the EduAI platform.
#
# When you connect this repo to Render (https://dashboard.render.com →
# New → Blueprint) it will read this file and set up the service for
# you. Edit the secret env vars (the ones with `sync: false`) in the
# Render dashboard before triggering the first deploy — Render leaves
# them blank for security.
#
# Why a single web service: Postgres lives on Supabase (already shared
# across the team), the embedder lives on a HuggingFace Space, so the
# only thing Render needs to host is the Django app itself.

services:
  - type: web
    name: eduai-platform
    runtime: docker
    plan: starter            # ~$7/mo, covered by Render credits. Free tier
                             # works too but auto-suspends after 15min idle.
    region: frankfurt        # closest to Supabase eu-west-1; tweak as you like
    branch: main             # auto-deploy on push to this branch
    autoDeploy: true
    healthCheckPath: /health/

    # Apply migrations BEFORE traffic switches to the new container so a
    # broken migration never serves a 500. `--noinput` is required;
    # Render's build environment is non-interactive.
    preDeployCommand: python manage.py migrate --noinput

    envVars:
      # ─── Required, secret — set in Render dashboard ───
      - key: DJANGO_SECRET_KEY
        generateValue: true        # Render generates a 256-bit random string
      - key: DATABASE_URL
        sync: false                # paste the Supabase transaction-pooler URL (port 6543)
      - key: EMBEDDER_API_KEY
        sync: false                # paste the HF Space secret here

      # ─── Required, public ───
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        # Render's hostname is auto-injected at runtime via
        # RENDER_EXTERNAL_HOSTNAME (settings.py picks it up automatically),
        # so this list is only the additional hosts you want to allow.
        value: "localhost,127.0.0.1"
      - key: EMBEDDER_API_URL
        value: "https://ibrahimdaud-text-embding-model.hf.space"
      - key: EMBEDDING_PROVIDER
        value: "remote"
      - key: EMBEDDING_MODEL_NAME
        value: "all-MiniLM-L6-v2"
      - key: VECTOR_STORE_TYPE
        value: "pgvector"

      # ─── Production-only (uncomment when you wire them up) ───
      # - key: REDIS_URL
      #   sync: false
      # - key: SENTRY_DSN
      #   sync: false
      # - key: EMAIL_HOST
      #   value: "smtp.gmail.com"
      # - key: EMAIL_HOST_USER
      #   sync: false
      # - key: EMAIL_HOST_PASSWORD
      #   sync: false
      # - key: DEFAULT_FROM_EMAIL
      #   value: "noreply@eduai.com"
