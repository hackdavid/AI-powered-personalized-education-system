{% extends 'base/base.html' %}

{% block title %}Change Password{% endblock %}

{% block content %}
<div class="container" style="max-width: 500px; margin: 4rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 2rem;">Change Password</h2>

        <form method="POST" action="{% url 'auth:password_change' %}">
            {% csrf_token %}

            <div class="form-group">
                <label for="old_password">Current Password</label>
                <input type="password" id="old_password" name="old_password" required autofocus>
            </div>

            <div class="form-group">
                <label for="new_password">New Password</label>
                <input type="password" id="new_password" name="new_password" required>
                <small style="color: #6B7280;">Minimum 8 characters</small>
            </div>

            <div class="form-group">
                <label for="confirm_password">Confirm New Password</label>
                <input type="password" id="confirm_password" name="confirm_password" required>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">
                Change Password
            </button>

            <div style="text-align: center; margin-top: 1rem;">
                <a href="{% url 'core:dashboard' %}">Back to Dashboard</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
