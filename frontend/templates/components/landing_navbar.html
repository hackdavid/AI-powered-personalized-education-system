{% load static %}

<nav class="sticky top-0 z-50 bg-white shadow-sm">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <!-- Logo -->
            <div class="flex-shrink-0">
                <a href="{% url 'web:home' %}" class="text-2xl font-bold text-indigo-600">
                    EduAI Platform
                </a>
            </div>

            <!-- Desktop Menu -->
            <div class="hidden md:flex space-x-8">
                <a href="#features" class="text-gray-700 hover:text-indigo-600 transition">Features</a>
                <a href="#about" class="text-gray-700 hover:text-indigo-600 transition">About</a>
                <a href="#contact" class="text-gray-700 hover:text-indigo-600 transition">Contact</a>
                {% if user.is_authenticated %}
                    <a href="{% url 'web:dashboard' %}" class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 transition">
                        Dashboard
                    </a>
                    <a href="{% url 'auth:logout' %}" class="px-4 py-2 rounded-lg border-2 border-indigo-600 text-indigo-600 hover:bg-indigo-50 transition">
                        Logout
                    </a>
                {% else %}
                    <a href="{% url 'auth:login' %}" class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700 transition">
                        Login
                    </a>
                {% endif %}
            </div>

            <!-- Mobile Menu Button -->
            <button id="mobile-menu-btn" class="md:hidden p-2 rounded-md text-gray-700 hover:bg-gray-100 transition">
                <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </button>
        </div>

        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden pb-4">
            <a href="#features" class="block py-2 text-gray-700 hover:text-indigo-600 transition">Features</a>
            <a href="#about" class="block py-2 text-gray-700 hover:text-indigo-600 transition">About</a>
            <a href="#contact" class="block py-2 text-gray-700 hover:text-indigo-600 transition">Contact</a>
            {% if user.is_authenticated %}
                <a href="{% url 'web:dashboard' %}" class="block mt-2 px-4 py-2 rounded-lg bg-indigo-600 text-white text-center hover:bg-indigo-700 transition">
                    Dashboard
                </a>
                <a href="{% url 'auth:logout' %}" class="block mt-2 px-4 py-2 rounded-lg border-2 border-indigo-600 text-indigo-600 text-center hover:bg-indigo-50 transition">
                    Logout
                </a>
            {% else %}
                <a href="{% url 'auth:login' %}" class="block mt-2 px-4 py-2 rounded-lg bg-indigo-600 text-white text-center hover:bg-indigo-700 transition">
                    Login
                </a>
            {% endif %}
        </div>
    </div>
</nav>

<script>
// Mobile menu toggle
const mobileMenuBtn = document.getElementById('mobile-menu-btn');
const mobileMenu = document.getElementById('mobile-menu');

if (mobileMenuBtn && mobileMenu) {
    mobileMenuBtn.addEventListener('click', () => {
        mobileMenu.classList.toggle('hidden');
    });
}
</script>
