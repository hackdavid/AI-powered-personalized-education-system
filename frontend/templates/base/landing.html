{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EduAI - AI-Powered Personalized Education Platform">
    <title>{% block title %}EduAI Platform{% endblock %}</title>

    <!-- CSRF Token for JavaScript -->
    <meta name="csrf-token" content="{{ csrf_token }}">

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    {% block extra_css %}{% endblock %}
</head>
<body class="font-sans antialiased">
    <!-- Toast Container for notifications -->
    <div id="toast-container"></div>

    <!-- Navigation -->
    {% include 'components/landing_navbar.html' %}

    <!-- Main Content -->
    {% block content %}{% endblock %}

    <!-- Footer -->
    {% include 'components/footer.html' %}

    <!-- Core JavaScript -->
    <script src="{% static 'js/core/api-client.js' %}"></script>
    <script src="{% static 'js/core/toast.js' %}"></script>
    <script src="{% static 'js/core/forms.js' %}"></script>
    <script src="{% static 'js/core/modal.js' %}"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
